# stock-agent — local & Vultr 단일 노드 운영용
#
# 사용:
#   docker compose up -d         # 기동
#   docker compose logs -f app   # 로그
#   docker compose pull && docker compose up -d   # GHCR 이미지 업데이트 후 재기동
#
# 상태는 ./data, ./wiki 볼륨으로 유지 (컨테이너 재생성해도 보존).

services:
  app:
    # 로컬 빌드 대신 GHCR 이미지를 쓰고 싶으면:
    #   image: ghcr.io/<owner>/stock-agent:latest
    build: .
    image: stock-agent:latest
    container_name: stock-agent-int
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - AGENT_INT_PORT=8001
      - STOCK_AGENT_DATA_DIR=/app/data
      - STOCK_AGENT_SEED_DIR=/app/seed
    ports:
      - "127.0.0.1:8001:8001"   # Caddy가 리버스 프록시 — 퍼블릭 노출 X
    volumes:
      - ./data:/app/data
      - ./wiki:/app/wiki
      # admin UI(/wiki/admin) 가 seed/wiki_facts.csv 를 직접 수정하므로 RW 마운트.
      # 호스트 파일에 그대로 반영됨 → git 으로 변경분 추적·커밋 가능.
      - ./seed:/app/seed
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as r; r.urlopen('http://127.0.0.1:8001/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  # Caddy — Let's Encrypt HTTPS (sslip.io 와일드카드 도메인 자동 발급)
  # 사용 시:  PUBLIC_HOST 환경변수를 `192-0-2-42.sslip.io` 같이 지정.
  caddy:
    image: caddy:2.8-alpine
    container_name: stock-agent-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      - PUBLIC_HOST=${PUBLIC_HOST:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
